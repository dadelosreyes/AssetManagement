version: '3.8'

services:
  api:
    image: ghcr.io/dadelosreyes/assetmanagement-api:latest
    environment:
      # External SQL Server — EF Core will auto-apply migrations on startup via db.Database.Migrate()
      - ConnectionStrings__AssetManagementContext=Data Source=10.10.11.240;Database=AssetManagement;User ID=sa;Password=Zebrap430i;Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=False;
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "0.0.0.0:5000:8080"
    restart: on-failure

  frontend:
    image: ghcr.io/dadelosreyes/assetmanagement-frontend:latest
    ports:
      - "0.0.0.0:8080:80"
    depends_on:
      - api
    restart: on-failure

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Check for updates every 300 seconds (5 minutes) for api and frontend containers
    command: --interval 300 api frontend
    restart: always
